name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Workload Identity Federation に必要

    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ vars.SERVICE || 'apps' }}" \
            --source . \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION || 'asia-northeast1' }}" \
            --allow-unauthenticated \
            --quiet \
            --set-env-vars="NUXT_SUPERUSER_EMAIL=${{ vars.SUPERUSER_EMAIL }},NUXT_OWNER_EMAIL=${{ vars.OWNER_EMAIL }},NUXT_GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }},NUXT_VERTEX_LOCATION=${{ vars.GCP_REGION || 'asia-northeast1' }}" \
            --set-secrets="NUXT_VAPID_PUBLIC=VAPID_PUBLIC_KEY:latest,NUXT_VAPID_PRIVATE=VAPID_PRIVATE_KEY:latest,NUXT_VAPID_SUBJECT=VAPID_SUBJECT:latest,NUXT_PUBLIC_VAPID_PUBLIC=VAPID_PUBLIC_KEY:latest,NUXT_PUBLIC_FIREBASE_CONFIG=FIREBASE_CONFIG:latest"

      - name: Show service URL
        run: |
          gcloud run services describe "${{ vars.SERVICE || 'apps' }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION || 'asia-northeast1' }}" \
            --format='value(status.url)'
